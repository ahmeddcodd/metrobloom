<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#8ecf6b" />
    <title>MetroBloom</title>
    <!-- YouTube Playables SDK MUST load before any game code. It is a classic
         (blocking, non-async) script so it executes before the deferred module
         bundle below — this is what the certification "SDK loaded before any
         game code" check requires. -->
    <script src="https://www.youtube.com/game_api/v1"></script>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
